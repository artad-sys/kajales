<!DOCTYPE html>
<html lang="hu">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Éttermek</title>
    <style>

        :root {
            --bg: #fff8ef;
            --bg-2: #f3e6d2;
            --card: rgba(255, 255, 255, 0.86);
            --card-solid: #ffffff;
            --text: #24170f;
            --muted: #7b6758;
            --line: rgba(74, 48, 28, 0.14);
            --brand: #e85d2a;
            --brand-2: #ffb000;
            --brand-dark: #9f3518;
            --good: #218c5a;
            --bad: #ce3d35;
            --warning: #f6c14b;
            --shadow: 0 18px 50px rgba(65, 38, 15, 0.13);
            --shadow-soft: 0 10px 30px rgba(65, 38, 15, 0.09);
            --radius: 22px;
            --radius-sm: 14px;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        html {
            scroll-behavior: smooth;
        }

        body {
            min-height: 100vh;
            font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            background:
                radial-gradient(circle at 12% 0%, rgba(255, 176, 0, 0.28), transparent 34%),
                radial-gradient(circle at 92% 8%, rgba(232, 93, 42, 0.20), transparent 30%),
                linear-gradient(145deg, var(--bg), var(--bg-2));
            color: var(--text);
            transition: background-color 0.25s ease, color 0.25s ease;
        }

        body.dark-mode {
            --bg: #11100f;
            --bg-2: #201812;
            --card: rgba(33, 28, 24, 0.86);
            --card-solid: #211c18;
            --text: #fff4e6;
            --muted: #c4ad96;
            --line: rgba(255, 244, 230, 0.14);
            --brand: #ff7443;
            --brand-2: #ffc24d;
            --brand-dark: #ff8a5b;
            --good: #4ec783;
            --bad: #ff6b5f;
            --warning: #f6c14b;
            background:
                radial-gradient(circle at 12% 0%, rgba(255, 176, 0, 0.13), transparent 34%),
                radial-gradient(circle at 92% 8%, rgba(232, 93, 42, 0.16), transparent 30%),
                linear-gradient(145deg, var(--bg), var(--bg-2));
            color: var(--text);
        }

        body::before {
            content: '';
            position: fixed;
            inset: 0;
            pointer-events: none;
            background-image: linear-gradient(rgba(255,255,255,0.07) 1px, transparent 1px), linear-gradient(90deg, rgba(255,255,255,0.06) 1px, transparent 1px);
            background-size: 46px 46px;
            mask-image: linear-gradient(to bottom, rgba(0,0,0,0.35), transparent 70%);
        }

        .container {
            width: min(1180px, calc(100% - 32px));
            margin: 0 auto;
            padding: 28px 0 56px;
            position: relative;
        }

        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            gap: 16px;
            margin-bottom: 24px;
            padding: 22px;
            border: 1px solid var(--line);
            border-radius: calc(var(--radius) + 6px);
            background: linear-gradient(135deg, rgba(255,255,255,0.82), rgba(255,255,255,0.48));
            box-shadow: var(--shadow-soft);
            backdrop-filter: blur(16px);
        }

        body.dark-mode .header {
            background: linear-gradient(135deg, rgba(45,38,32,0.86), rgba(34,27,22,0.62));
        }

        .header h1 {
            font-size: clamp(24px, 4vw, 40px);
            line-height: 1.05;
            letter-spacing: -0.045em;
            font-weight: 900;
        }

        .button-group, .restaurant-actions {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
            justify-content: flex-end;
        }

        button, .back-btn, .dark-mode-toggle {
            appearance: none;
            padding: 11px 16px;
            border: 1px solid transparent;
            border-radius: 999px;
            cursor: pointer;
            font-size: 14px;
            font-weight: 800;
            letter-spacing: -0.01em;
            transition: transform 0.18s ease, box-shadow 0.18s ease, background-color 0.18s ease, border-color 0.18s ease;
            box-shadow: 0 8px 20px rgba(36, 23, 15, 0.10);
        }

        button:hover, .back-btn:hover, .dark-mode-toggle:hover {
            transform: translateY(-1px);
            box-shadow: 0 12px 26px rgba(36, 23, 15, 0.15);
        }

        button:active, .back-btn:active, .dark-mode-toggle:active {
            transform: translateY(0);
        }

        .btn-primary, .back-btn {
            background: linear-gradient(135deg, var(--brand), var(--brand-dark));
            color: #fff;
        }

        .btn-primary:hover, .back-btn:hover,
        body.dark-mode .btn-primary:hover, body.dark-mode .back-btn:hover {
            background: linear-gradient(135deg, var(--brand-dark), var(--brand));
        }

        .btn-success, .btn-view {
            background: linear-gradient(135deg, var(--good), #146a42);
            color: #fff;
        }

        .btn-success:hover, .btn-view:hover,
        body.dark-mode .btn-success:hover, body.dark-mode .btn-view:hover {
            background: linear-gradient(135deg, #146a42, var(--good));
        }

        .btn-danger {
            background: linear-gradient(135deg, var(--bad), #96241f);
            color: #fff;
        }

        .btn-danger:hover, body.dark-mode .btn-danger:hover {
            background: linear-gradient(135deg, #96241f, var(--bad));
        }

        .btn-warning, .dark-mode-toggle {
            background: rgba(255, 255, 255, 0.72);
            color: var(--text);
            border-color: var(--line);
        }

        .btn-warning:hover, .dark-mode-toggle:hover,
        body.dark-mode .btn-warning:hover, body.dark-mode .dark-mode-toggle:hover {
            background: rgba(255, 194, 77, 0.22);
            color: var(--text);
        }

        body.dark-mode .btn-warning, body.dark-mode .dark-mode-toggle {
            background: rgba(255, 255, 255, 0.08);
            color: var(--text);
            border-color: var(--line);
        }

        .search-container {
            margin-bottom: 24px;
        }

        .search-input,
        input[type="text"],
        input[type="email"],
        input[type="tel"],
        textarea {
            width: 100%;
            padding: 15px 17px;
            border: 1px solid var(--line);
            border-radius: var(--radius-sm);
            background: rgba(255, 255, 255, 0.82);
            color: var(--text);
            font-family: inherit;
            font-size: 15px;
            outline: none;
            transition: border-color 0.18s ease, box-shadow 0.18s ease, background 0.18s ease;
            box-shadow: inset 0 1px 0 rgba(255,255,255,0.7);
        }

        body.dark-mode .search-input,
        body.dark-mode input[type="text"],
        body.dark-mode input[type="email"],
        body.dark-mode input[type="tel"],
        body.dark-mode textarea {
            background: rgba(255, 255, 255, 0.075);
            color: var(--text);
            border-color: var(--line);
            box-shadow: none;
        }

        .search-input:focus,
        input[type="text"]:focus,
        input[type="email"]:focus,
        input[type="tel"]:focus,
        textarea:focus {
            border-color: rgba(232, 93, 42, 0.72);
            box-shadow: 0 0 0 4px rgba(232, 93, 42, 0.12);
        }

        textarea {
            resize: vertical;
            min-height: 150px;
            line-height: 1.65;
        }

        .restaurants-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
            gap: 18px;
            margin-bottom: 30px;
        }

        .restaurant-card,
        .form-container,
        .restaurants-list,
        .restaurant-info,
        .no-data,
        .info-box {
            border: 1px solid var(--line);
            border-radius: var(--radius);
            background: var(--card);
            box-shadow: var(--shadow-soft);
            backdrop-filter: blur(14px);
        }

        .restaurant-card {
            overflow: hidden;
            cursor: pointer;
            transition: transform 0.2s ease, box-shadow 0.2s ease, border-color 0.2s ease;
        }

        .restaurant-card:hover {
            transform: translateY(-5px);
            box-shadow: var(--shadow);
            border-color: rgba(232, 93, 42, 0.34);
        }

        body.dark-mode .restaurant-card,
        body.dark-mode .form-container,
        body.dark-mode .restaurants-list,
        body.dark-mode .restaurant-info,
        body.dark-mode .no-data,
        body.dark-mode .info-box {
            background: var(--card);
            box-shadow: 0 18px 50px rgba(0, 0, 0, 0.26);
        }

        .restaurant-card-header {
            min-height: 126px;
            display: flex;
            align-items: center;
            justify-content: center;
            text-align: center;
            padding: 24px;
            color: #fff;
            background:
                radial-gradient(circle at 20% 0%, rgba(255,255,255,0.28), transparent 32%),
                linear-gradient(135deg, var(--brand), var(--brand-dark));
        }

        body.dark-mode .restaurant-card-header {
            background:
                radial-gradient(circle at 20% 0%, rgba(255,255,255,0.18), transparent 32%),
                linear-gradient(135deg, #8a2f1a, #3a1c12);
        }

        .restaurant-card-header h3 {
            font-size: 22px;
            line-height: 1.1;
            letter-spacing: -0.03em;
            font-weight: 900;
        }

        .restaurant-card-footer {
            padding: 16px;
            background: rgba(255, 255, 255, 0.50);
            border-top: 1px solid var(--line);
            text-align: center;
        }

        body.dark-mode .restaurant-card-footer {
            background: rgba(255, 255, 255, 0.045);
            border-top-color: var(--line);
        }

        .btn-view {
            width: 100%;
        }

        .form-container,
        .restaurants-list,
        .restaurant-info,
        .no-data,
        .info-box {
            padding: 22px;
            margin-bottom: 24px;
        }

        .form-container h2,
        .restaurants-list h2,
        .menu-section h2 {
            margin-bottom: 18px;
            font-size: 24px;
            letter-spacing: -0.035em;
            font-weight: 900;
        }

        .form-group {
            margin-bottom: 15px;
        }

        label {
            display: block;
            margin-bottom: 7px;
            color: var(--muted);
            font-weight: 800;
            font-size: 13px;
            text-transform: uppercase;
            letter-spacing: 0.045em;
        }

        .restaurant-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            gap: 16px;
            padding: 16px;
            border: 1px solid var(--line);
            border-radius: var(--radius-sm);
            margin-bottom: 12px;
            background: rgba(255, 255, 255, 0.56);
            border-left: 6px solid var(--brand);
        }

        body.dark-mode .restaurant-item {
            background: rgba(255, 255, 255, 0.055);
            border-left-color: var(--brand);
        }

        .restaurant-info h1 {
            margin-bottom: 18px;
            font-size: clamp(30px, 5vw, 48px);
            line-height: 1;
            letter-spacing: -0.055em;
            font-weight: 950;
        }

        .restaurant-info h3 {
            margin-bottom: 6px;
            font-size: 19px;
            letter-spacing: -0.02em;
        }

        .restaurant-info p,
        .restaurant-info p {
            margin-bottom: 10px;
            color: var(--muted);
            font-size: 15px;
        }

        .restaurant-info strong {
            color: var(--text);
        }

        .menu-section {
            margin-top: 22px;
        }

        .menu-section h2 {
            padding-bottom: 12px;
            border-bottom: 2px solid rgba(232, 93, 42, 0.35);
        }

        body.dark-mode .menu-section h2 {
            border-bottom-color: rgba(255, 116, 67, 0.35);
        }

        .menu-content {
            white-space: pre-wrap;
            word-wrap: break-word;
            line-height: 1.85;
            padding: 18px;
            border-radius: var(--radius-sm);
            border: 1px solid var(--line);
            border-left: 6px solid var(--brand);
            background: rgba(255, 255, 255, 0.64);
            color: var(--text);
            font-family: ui-monospace, SFMono-Regular, Menlo, Consolas, monospace;
            font-size: 14px;
        }

        body.dark-mode .menu-content {
            background: rgba(255, 255, 255, 0.055);
            border-left-color: var(--brand);
        }

        .loading,
        .no-restaurants,
        .no-data {
            text-align: center;
            padding: 38px;
            color: var(--muted);
            font-size: 17px;
        }

        .error {
            padding: 15px 17px;
            border: 1px solid rgba(206, 61, 53, 0.25);
            border-radius: var(--radius-sm);
            background: rgba(206, 61, 53, 0.10);
            color: var(--bad);
            margin-bottom: 20px;
            font-weight: 700;
        }

        .success-message {
            display: none;
            padding: 14px 16px;
            border-radius: var(--radius-sm);
            margin-bottom: 18px;
            background: rgba(33, 140, 90, 0.13);
            color: var(--good);
            border: 1px solid rgba(33, 140, 90, 0.22);
            font-weight: 800;
        }

        .info-box {
            color: var(--muted);
            border-left: 6px solid var(--brand-2);
            line-height: 1.65;
        }

        .info-box strong {
            color: var(--text);
        }

        @media (max-width: 720px) {
            .container {
                width: min(100% - 22px, 1180px);
                padding-top: 14px;
            }

            .header {
                align-items: stretch;
                flex-direction: column;
                padding: 18px;
                border-radius: 20px;
            }

            .button-group, .restaurant-actions {
                width: 100%;
            }

            button, .back-btn, .dark-mode-toggle {
                flex: 1;
                padding: 12px 14px;
            }

            .restaurants-grid {
                grid-template-columns: 1fr;
            }

            .restaurant-item {
                align-items: stretch;
                flex-direction: column;
            }
        }

    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>🍽️ Éttermek - Siófok és környéke</h1>
            <div class="button-group">
                <button class="btn-warning" onclick="toggleDarkMode()" id="darkModeBtn">Világos / Sötét</button>
            </div>
        </div>

        <div class="search-container">
            <input type="text" id="searchInput" class="search-input" placeholder="🔍 Keresd meg az éttermet...">
        </div>

        <div id="restaurantsList" class="loading">Éttermek betöltésben...</div>
    </div>

    <script>
        let allRestaurants = [];

        // Dark mode kezelés
        function toggleDarkMode() {
            document.body.classList.toggle('dark-mode');
            localStorage.setItem('darkMode', document.body.classList.contains('dark-mode'));
            updateDarkModeButton();
        }

        // Dark mode gomb szöveg frissítése
        function updateDarkModeButton() {
            const btn = document.getElementById('darkModeBtn');
            if (document.body.classList.contains('dark-mode')) {
                btn.textContent = 'Világos / Sötét';
            } else {
                btn.textContent = 'Világos / Sötét';
            }
        }

        // Dark mode betöltés indításnál
        if (localStorage.getItem('darkMode') === 'true') {
            document.body.classList.add('dark-mode');
        }
        updateDarkModeButton();

        // Keresés
        function filterRestaurants() {
            const searchTerm = document.getElementById('searchInput').value.toLowerCase();
            const filtered = allRestaurants.filter(restaurant =>
                restaurant.name.toLowerCase().includes(searchTerm)
            );
            displayRestaurants(filtered);
        }

        // Éttermek megjelenítése
        function displayRestaurants(restaurants) {
            const list = document.getElementById('restaurantsList');

            if (restaurants.length === 0) {
                list.innerHTML = '<div class="no-restaurants">Nincs találat.</div>';
                return;
            }

            let html = '<div class="restaurants-grid">';
            restaurants.forEach(restaurant => {
                html += `
                    <div class="restaurant-card" onclick="goToRestaurant(${restaurant.id})">
                        <div class="restaurant-card-header">
                            <h3>${restaurant.name}</h3>
                        </div>
                        <div class="restaurant-card-footer">
                            <button class="btn-view">Megtekintés →</button>
                        </div>
                    </div>
                `;
            });
            html += '</div>';

            list.innerHTML = html;
        }

        // Éttermek betöltése
        async function loadRestaurants() {
            try {
                const response = await fetch('restaurants.json');
                if (!response.ok) {
                    throw new Error('restaurants.json nem található!');
                }

                allRestaurants = await response.json();
                console.log('Betöltött éttermek:', allRestaurants);

                if (!Array.isArray(allRestaurants) || allRestaurants.length === 0) {
                    document.getElementById('restaurantsList').innerHTML = '<div class="no-restaurants">Nincs még étterem.</div>';
                    return;
                }

                displayRestaurants(allRestaurants);

            } catch (error) {
                console.error('Hiba:', error);
                document.getElementById('restaurantsList').innerHTML = `<div class="error">Hiba az éttermek betöltésekor: ${error.message}</div>`;
            }
        }

        // Étterem megtekintése
        function goToRestaurant(id) {
            window.location.href = `restaurant.html?id=${id}`;
        }

        // Keresési mező eseménye
        document.getElementById('searchInput').addEventListener('input', filterRestaurants);

        // Oldal betöltésénél az éttermeket töltjük be
        loadRestaurants();
    </script>
</body>
</html>
