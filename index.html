<!DOCTYPE html>
<html lang="hu">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Éttermek — Siófok és környéke</title>
<style>
:root{
  --bg:#0b1020;
  --bg2:#111827;
  --card:rgba(255,255,255,.08);
  --card2:rgba(255,255,255,.12);
  --text:#f8fafc;
  --muted:#94a3b8;
  --line:rgba(255,255,255,.12);
  --accent:#f97316;
  --accent2:#fb923c;
  --good:#22c55e;
  --danger:#ef4444;
  --shadow:0 22px 70px rgba(0,0,0,.35);
  --radius:24px;
}
*{box-sizing:border-box;margin:0;padding:0}
body{
  font-family:Inter,system-ui,-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;
  min-height:100vh;
  color:var(--text);
  background:
    radial-gradient(circle at 12% 0%,rgba(249,115,22,.25),transparent 28rem),
    radial-gradient(circle at 88% 10%,rgba(59,130,246,.18),transparent 26rem),
    linear-gradient(135deg,#070b16,#111827 55%,#0b1020);
}
a{color:inherit;text-decoration:none}
button,input,textarea{font:inherit}
.container{width:min(1180px,calc(100% - 32px));margin:0 auto;padding:28px 0 48px}
.topbar{
  position:sticky;top:0;z-index:50;
  backdrop-filter:blur(18px);
  background:linear-gradient(180deg,rgba(11,16,32,.92),rgba(11,16,32,.68));
  border-bottom:1px solid var(--line);
}
.topbar-inner{
  width:min(1180px,calc(100% - 32px));
  margin:0 auto;
  padding:14px 0;
  display:flex;align-items:center;justify-content:space-between;gap:14px;
}
.brand{display:flex;align-items:center;gap:12px;font-weight:900;letter-spacing:-.04em}
.logo{
  width:42px;height:42px;border-radius:16px;
  display:grid;place-items:center;
  background:linear-gradient(135deg,var(--accent),#ffd166);
  box-shadow:0 12px 30px rgba(249,115,22,.28);
}
.brand small{display:block;font-size:12px;font-weight:700;color:var(--muted);letter-spacing:0}
.nav-actions{display:flex;gap:10px;align-items:center;flex-wrap:wrap}
.btn{
  border:1px solid var(--line);
  border-radius:15px;
  padding:10px 14px;
  background:rgba(255,255,255,.08);
  color:var(--text);
  cursor:pointer;
  transition:.18s ease;
  font-weight:800;
}
.btn:hover{transform:translateY(-1px);background:rgba(255,255,255,.14)}
.btn-primary{background:linear-gradient(135deg,var(--accent),var(--accent2));border:none;color:#1f1308}
.btn-danger{background:rgba(239,68,68,.18);border-color:rgba(239,68,68,.35)}
.hero{
  margin:26px 0 22px;
  padding:34px;
  border:1px solid var(--line);
  border-radius:32px;
  background:
    linear-gradient(135deg,rgba(255,255,255,.12),rgba(255,255,255,.04)),
    radial-gradient(circle at 90% 20%,rgba(249,115,22,.16),transparent 18rem);
  box-shadow:var(--shadow);
}
.hero h1{font-size:clamp(34px,5vw,62px);letter-spacing:-.08em;line-height:.95;margin-bottom:12px}
.hero p{color:var(--muted);font-size:17px;max-width:720px;line-height:1.6}
.search-panel{
  position:sticky;top:72px;z-index:40;
  margin:0 0 24px;
  padding:14px;
  border:1px solid var(--line);
  border-radius:24px;
  background:rgba(15,23,42,.78);
  backdrop-filter:blur(18px);
  box-shadow:0 12px 40px rgba(0,0,0,.22);
}
.search-row{display:grid;grid-template-columns:1fr auto;gap:10px}
.search-input,.field,textarea{
  width:100%;
  border:1px solid var(--line);
  outline:none;
  border-radius:18px;
  background:rgba(255,255,255,.08);
  color:var(--text);
  padding:14px 16px;
}
.search-input:focus,.field:focus,textarea:focus{border-color:rgba(249,115,22,.7);box-shadow:0 0 0 4px rgba(249,115,22,.13)}
.chips{display:flex;flex-wrap:wrap;gap:8px;margin-top:12px}
.chip{
  border:1px solid var(--line);
  color:var(--muted);
  background:rgba(255,255,255,.06);
  border-radius:999px;
  padding:8px 11px;
  cursor:pointer;
  font-size:13px;
  font-weight:800;
}
.chip:hover,.chip.active{background:rgba(249,115,22,.18);border-color:rgba(249,115,22,.42);color:#fed7aa}
.meta-row{display:flex;justify-content:space-between;gap:14px;align-items:center;margin:14px 2px;color:var(--muted);font-size:14px}
.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(270px,1fr));gap:18px}
.card{
  border:1px solid var(--line);
  border-radius:var(--radius);
  background:linear-gradient(180deg,rgba(255,255,255,.12),rgba(255,255,255,.06));
  overflow:hidden;
  box-shadow:0 14px 42px rgba(0,0,0,.24);
  transition:.2s ease;
}
.card:hover{transform:translateY(-4px);border-color:rgba(249,115,22,.38)}
.card-head{padding:22px;min-height:122px;display:flex;flex-direction:column;justify-content:space-between;background:radial-gradient(circle at 100% 0%,rgba(249,115,22,.24),transparent 12rem)}
.badges{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:12px}
.badge{font-size:12px;font-weight:900;color:#ffedd5;background:rgba(249,115,22,.18);border:1px solid rgba(249,115,22,.32);padding:6px 9px;border-radius:999px}
.card h3{font-size:22px;line-height:1.05;letter-spacing:-.04em}
.card-body{padding:18px 22px;color:var(--muted);line-height:1.55}
.preview{margin-top:10px;padding-top:10px;border-top:1px solid var(--line);font-size:14px}
.card-actions{display:grid;grid-template-columns:1fr 1fr;gap:10px;padding:0 22px 22px}
.action{display:block;text-align:center;border-radius:15px;padding:11px;background:rgba(255,255,255,.08);border:1px solid var(--line);font-weight:900}
.action.primary{background:linear-gradient(135deg,var(--accent),var(--accent2));border:none;color:#241305}
.empty,.loading,.error{
  border:1px solid var(--line);
  border-radius:var(--radius);
  padding:34px;
  text-align:center;
  color:var(--muted);
  background:rgba(255,255,255,.07);
}
.detail-card,.panel{
  border:1px solid var(--line);
  border-radius:32px;
  background:linear-gradient(180deg,rgba(255,255,255,.12),rgba(255,255,255,.06));
  box-shadow:var(--shadow);
  overflow:hidden;
}
.detail-hero{padding:34px;background:radial-gradient(circle at 88% 12%,rgba(249,115,22,.22),transparent 18rem)}
.detail-hero h1{font-size:clamp(36px,5vw,58px);letter-spacing:-.08em;line-height:.95;margin-bottom:18px}
.info-list{display:grid;gap:10px;color:var(--muted)}
.info-list a{color:#fed7aa;font-weight:800}
.menu-box{padding:26px}
.menu-box h2{font-size:26px;letter-spacing:-.05em;margin-bottom:14px}
.menu-content{
  white-space:pre-wrap;
  line-height:1.85;
  color:#e5e7eb;
  background:rgba(0,0,0,.22);
  border:1px solid var(--line);
  border-radius:22px;
  padding:22px;
}
.form-grid{display:grid;gap:14px}
.form-group label{display:block;margin:0 0 7px;color:#cbd5e1;font-weight:900}
textarea{min-height:170px;resize:vertical}
.list{display:grid;gap:12px}
.list-item{
  display:grid;grid-template-columns:1fr auto;gap:14px;align-items:center;
  padding:16px;
  border:1px solid var(--line);
  border-radius:20px;
  background:rgba(255,255,255,.06);
}
.list-item p{color:var(--muted);font-size:14px;margin-top:4px}
.notice{padding:16px;border-radius:20px;border:1px solid rgba(249,115,22,.28);background:rgba(249,115,22,.10);color:#fed7aa;margin-bottom:18px;line-height:1.6}
.success{display:none;padding:14px;border-radius:18px;background:rgba(34,197,94,.14);border:1px solid rgba(34,197,94,.32);color:#bbf7d0;margin-bottom:18px}
@media(max-width:720px){
  .container,.topbar-inner{width:min(100% - 22px,1180px)}
  .topbar-inner{align-items:flex-start}
  .brand small{display:none}
  .hero{padding:24px;border-radius:26px}
  .search-panel{top:68px;border-radius:20px}
  .search-row{grid-template-columns:1fr}
  .grid{grid-template-columns:1fr}
  .card-actions{grid-template-columns:1fr}
  .list-item{grid-template-columns:1fr}
  .nav-actions{justify-content:flex-end}
}
</style>
</head>
<body>
<header class="topbar">
  <div class="topbar-inner">
    <a class="brand" href="index.html"><span class="logo">🍽️</span><span>KajaRadar<small>Siófok és környéke</small></span></a>
    <div class="nav-actions">
      <button class="btn" onclick="randomPick()">🎲 Mit egyek?</button>
      <a class="btn" href="admin.html">Admin</a>
    </div>
  </div>
</header>

<main class="container">
  <section class="hero">
    <h1>Mit ennél ma?</h1>
    <p>Gyors étterem- és menükereső. Név, cím, telefon, email és menü alapján is keres. Faék egyszerű, de használható.</p>
  </section>

  <section class="search-panel">
    <div class="search-row">
      <input id="searchInput" class="search-input" type="search" placeholder="🔍 Keresés: pizza, leves, étterem neve, cím..." autocomplete="off">
      <button class="btn btn-primary" onclick="clearSearch()">Törlés</button>
    </div>
    <div class="chips" id="chips">
      <button class="chip" data-q="">Összes</button>
      <button class="chip" data-q="pizza">🍕 Pizza</button>
      <button class="chip" data-q="leves">🍲 Leves</button>
      <button class="chip" data-q="főétel">🍛 Főétel</button>
      <button class="chip" data-q="desszert">🍰 Desszert</button>
    </div>
  </section>

  <div class="meta-row">
    <strong id="resultCount">Betöltés...</strong>
    <span>Adatforrás: restaurants.json</span>
  </div>

  <div id="restaurantsList" class="loading">Éttermek betöltésben...</div>
</main>

<script>
let allRestaurants = [];
let currentQuery = "";

function clean(v){ return (v || "").toString(); }
function mapLink(address){ return "https://www.google.com/maps/search/?api=1&query=" + encodeURIComponent(address || ""); }
function telLink(phone){ return "tel:" + clean(phone).replace(/[^+0-9]/g,""); }
function previewMenu(menu){
  const text = clean(menu).replace(/\s+/g," ").trim();
  return text ? text.slice(0, 120) + (text.length > 120 ? "..." : "") : "Nincs menü megadva.";
}

function filterRestaurants() {
  const q = currentQuery.toLowerCase().trim();
  const filtered = allRestaurants.filter(r => {
    const blob = [r.name,r.address,r.phone,r.email,r.menu].map(clean).join(" ").toLowerCase();
    return !q || blob.includes(q);
  });
  displayRestaurants(filtered);
}

function displayRestaurants(restaurants) {
  const list = document.getElementById("restaurantsList");
  document.getElementById("resultCount").textContent = restaurants.length + " találat";

  if (!restaurants.length) {
    list.className = "empty";
    list.innerHTML = "Nincs találat. Próbálj másik szót.";
    return;
  }

  list.className = "grid";
  list.innerHTML = restaurants.map(r => `
    <article class="card">
      <a href="restaurant.html?id=${r.id}" class="card-head">
        <div class="badges">
          <span class="badge">Nyitva? ellenőrizd</span>
          <span class="badge">Menü</span>
        </div>
        <h3>${clean(r.name)}</h3>
      </a>
      <div class="card-body">
        <div>📍 ${clean(r.address) || "Nincs cím"}</div>
        <div>📞 ${clean(r.phone) || "Nincs telefon"}</div>
        <div class="preview">${previewMenu(r.menu)}</div>
      </div>
      <div class="card-actions">
        <a class="action" target="_blank" href="${mapLink(r.address)}">Térkép</a>
        <a class="action primary" href="restaurant.html?id=${r.id}">Megnézem</a>
      </div>
    </article>
  `).join("");
}

async function loadRestaurants() {
  try {
    const response = await fetch("restaurants.json?cache=" + Date.now());
    if (!response.ok) throw new Error("restaurants.json nem található!");
    allRestaurants = await response.json();
    if (!Array.isArray(allRestaurants)) throw new Error("A JSON nem lista.");
    filterRestaurants();
  } catch (error) {
    const list = document.getElementById("restaurantsList");
    list.className = "error";
    list.textContent = "Hiba az éttermek betöltésekor: " + error.message;
  }
}

function clearSearch(){
  currentQuery = "";
  document.getElementById("searchInput").value = "";
  document.querySelectorAll(".chip").forEach(c=>c.classList.remove("active"));
  document.querySelector('.chip[data-q=""]').classList.add("active");
  filterRestaurants();
}

function randomPick(){
  if (!allRestaurants.length) return;
  const r = allRestaurants[Math.floor(Math.random()*allRestaurants.length)];
  window.location.href = "restaurant.html?id=" + r.id;
}

document.getElementById("searchInput").addEventListener("input", e => {
  currentQuery = e.target.value;
  document.querySelectorAll(".chip").forEach(c=>c.classList.remove("active"));
  filterRestaurants();
});

document.getElementById("chips").addEventListener("click", e => {
  const chip = e.target.closest(".chip");
  if (!chip) return;
  currentQuery = chip.dataset.q || "";
  document.getElementById("searchInput").value = currentQuery;
  document.querySelectorAll(".chip").forEach(c=>c.classList.remove("active"));
  chip.classList.add("active");
  filterRestaurants();
});

document.querySelector('.chip[data-q=""]').classList.add("active");
loadRestaurants();
</script>
</body>
</html>
