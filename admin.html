<!DOCTYPE html>
<html lang="hu">
<head>
    <meta charset="UTF-8">
    <title>Adat Generátor</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <h1>Új Étterem Hozzáadása</h1>
        <div class="admin-form">
            <input type="text" id="name" placeholder="Név">
            <input type="text" id="address" placeholder="Cím">
            <input type="text" id="open" placeholder="Nyitvatartás (pl: H-P: 10-22)">
            <input type="text" id="phone" placeholder="Telefon">
            <input type="text" id="email" placeholder="Email">
            <textarea id="menu" placeholder="# Előételek&#10;Húsleves - 1200 Ft&#10;# Főételek&#10;Rántott hús - 2500 Ft"></textarea>
            
            <button onclick="generateData()">ADAT GENERÁLÁSA</button>
        </div>

        <h3>Másold ezt az egészet az adatok.js fájlba:</h3>
        <textarea id="output" readonly style="height: 200px; font-family: monospace; font-size: 12px;"></textarea>
    </div>

    <script src="adatok.js"></script>
    <script>
        function generateData() {
            const newItem = {
                id: Date.now(),
                name: document.getElementById('name').value,
                address: document.getElementById('address').value,
                open: document.getElementById('open').value,
                phone: document.getElementById('phone').value,
                email: document.getElementById('email').value,
                menu: document.getElementById('menu').value
            };

            const updatedData = [...RESTAURANT_DATA, newItem];
            const fileContent = "const RESTAURANT_DATA = " + JSON.stringify(updatedData, null, 2) + ";";
            document.getElementById('output').value = fileContent;
        }
    </script>
</body>
</html>
